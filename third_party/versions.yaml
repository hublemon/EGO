  # app/vjepa_2_1/models) is vendored verbatim under third_party/vjepa2/,
  # licensed under V-JEPA2's own MIT license (see LICENSE-VJEPA2 /
  # APACHE-LICENSE-VJEPA2 alongside it). Only the minimal set of files needed
  # to instantiate and run the frozen backbone was copied -- not the full
  # upstream repo (training scripts, other apps, etc. were left out).
  checkpoint_name: vitl.pt
  checkpoint_source: local (copied from the EvE/V-JEPA2 prototype checkpoint download)
  local_checkpoint_path: checkpoints/vjepa2/vitl.pt
  architecture: vit_large, patch_size=16, tubelet_size=2, resolution=256

