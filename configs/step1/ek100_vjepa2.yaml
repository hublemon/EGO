experiment:
  name: ek100_vjepa2_action_anticipation
  seed: 42
  output_dir: outputs/step1/ek100_vjepa2

dataset:
  name: ek100
  annotation_train: data/annotations/EPIC_100_train.csv
  annotation_val: data/annotations/EPIC_100_validation_subset.csv
  video_root: data/EPIC-KITCHENS
  file_format: 0
  verb_classes_csv: data/annotations/EPIC_100_verb_classes.csv
  noun_classes_csv: data/annotations/EPIC_100_noun_classes.csv
  frames_per_clip: 32
  frames_per_second: 8
  resolution: 256
  # Fixed horizon used to build the validation split sampled during training.
  anticipation_time_sec: [1.0, 1.0]
  # Randomized per-clip horizon range sampled only for training clips.
  train_anticipation_time_sec: [0.25, 1.75]
  auto_augment: true
  motion_shift: false
  reprob: 0.25
  random_resize_scale: [0.08, 1.0]
  num_workers: 4
  pin_memory: true

model:
  backbone: vjepa2
  checkpoint: checkpoints/vjepa2/vitl.pt
  repository_dir: third_party/vjepa2
  classifier:
    num_probe_blocks: 4
    num_heads: 16
  model_kwargs:
    use_v2_1: false
    encoder:
      model_name: vit_large
      checkpoint_key: target_encoder
      tubelet_size: 2
      patch_size: 16
      uniform_power: true
      use_rope: true
    predictor:
      model_name: vit_predictor
      checkpoint_key: predictor
      num_frames: 64
      depth: 12
      num_heads: 12
      predictor_embed_dim: 384
      num_mask_tokens: 10
      uniform_power: true
      use_mask_tokens: true
      use_sdpa: true
      use_silu: false
      wide_silu: false
      use_rope: true
  wrapper_kwargs:
    no_predictor: false
    num_output_frames: 2
    num_steps: 1

training:
  batch_size: 8
  learning_rate: 0.0002
  weight_decay: 0.0001
  final_weight_decay: 0.0001
  final_lr: 0.0
  start_lr: 0.0
  warmup_epochs: 1
  epochs: 5
  use_bfloat16: true
  use_focal_loss: true
  use_feature_cache: false

checkpoint:
  output_dir: checkpoints/step1/ek100_vjepa2
