# GoalStep Z=1 SMOKE config -- end-to-end validation of tasks 1-6 on a handful
# of videos. Same model/probe/loss as z1.yaml; only the data scope and epoch
# budget shrink. Numbers produced here are meaningless as results.
#
#   head -n 6 src/ego/step1_action_anticipation/goalstep/index/video_uids.txt > outputs/goalstep/index_smoke/uids.txt   # (train uids)
#   python src/ego/step1_action_anticipation/goalstep/build_goalstep_z1_index.py \
#       --video-uid-subset outputs/goalstep/index_smoke/uids.txt \
#       --output-dir outputs/goalstep/index_smoke
#   python src/ego/step1_action_anticipation/goalstep/download_goalstep_videos.py \
#       --uid-list outputs/goalstep/index_smoke/video_uids.txt \
#       --manifest data/Ego4D/v2/video_540ss/manifest.csv \
#       --manifest data/Ego4D/v2/full_scale/manifest.csv \
#       --out-dir data/Ego4D/v2/goalstep_videos
#   python scripts/step1/ego4d_lta/extract_features.py --config configs/step1/goalstep/smoke.yaml --split train
#   python scripts/step1/ego4d_lta/extract_features.py --config configs/step1/goalstep/smoke.yaml --split val
#   python src/ego/step1_action_anticipation/goalstep/train_goalstep_z1.py --config configs/step1/goalstep/smoke.yaml

experiment:
  name: goalstep_z1_smoke
  seed: 42
  output_dir: outputs/goalstep/runs/smoke

dataset:
  index_dir: outputs/goalstep/index_smoke
  feature_cache_dir: data/Ego4D/goalstep_feature_cache_smoke
  video_root: data/Ego4D/v2/goalstep_videos
  video_source: full_scale
  tau_a: 1.0
  l_obs: 3.875   # 31/8 -> inter-frame gap exactly 1/8 s (paper's 32f@8fps)
  frames_per_clip: 32
  frames_per_second: 8
  resolution: 256
  num_workers: 4

model:
  backbone: vjepa2
  checkpoint: checkpoints/vjepa2/vitl.pt
  repository_dir: third_party/vjepa2
  classifier:
    num_probe_blocks: 4
    num_heads: 16
  model_kwargs:
    use_v2_1: false
    encoder:
      model_name: vit_large
      checkpoint_key: target_encoder
      tubelet_size: 2
      patch_size: 16
      uniform_power: true
      use_rope: true
    predictor:
      model_name: vit_predictor
      checkpoint_key: predictor
      num_frames: 64
      depth: 12
      num_heads: 12
      predictor_embed_dim: 384
      num_mask_tokens: 10
      uniform_power: true
      use_mask_tokens: true
      use_sdpa: true
      use_silu: false
      wide_silu: false
      use_rope: true
  wrapper_kwargs:
    no_predictor: false
    num_output_frames: 2
    num_steps: 1

extraction:
  batch_size: 8

training:
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.0001
  final_weight_decay: 0.0001
  start_lr: 0.0
  final_lr: 0.0
  warmup_epochs: 0
  epochs: 1
  sampler: random
  focal_gamma: 2.0
  focal_alpha: 0.25
  val_subset_size: 100
  val_subset_seed: 42
