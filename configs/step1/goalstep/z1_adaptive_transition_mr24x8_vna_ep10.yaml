# Adaptive A1-boundary observation -> close same-level next action A2.
experiment:
  name: goalstep_z1_adaptive_transition_mr24x8_vna_ep10
  seed: 42
  output_dir: outputs/goalstep/runs/z1_adaptive_transition_mr24x8_vna_ep10

dataset:
  index_dir: src/ego/step1_action_anticipation/goalstep/index_adaptive_transition_mr24x8
  feature_cache_dir: ../datasets/Ego4D/goalstep_feature_cache_adaptive_transition_mr24x8_vna
  video_root: ../datasets/Ego4D/v2/goalstep_videos
  video_source: full_scale
  # Fixed V-JEPA predictor conditioning. This is deliberately not the future
  # annotation gap, which is unavailable at inference time.
  tau_a: 1.0
  # Maximum physical observation span; actual index windows are 0.75--32 s.
  l_obs: 32.0
  frames_per_clip: 32
  # This is the V-JEPA predictor position grid, not the variable physical
  # sampling rate.  Keep it at 2 so the fixed 1-second predictor conditioning
  # exactly matches the immediately preceding start-1s/16s experiment.
  frames_per_second: 2
  resolution: 256
  num_workers: 8
  frame_sampling:
    strategy: adaptive_multirate
    global_frames: 24
    terminal_frames: 8
    terminal_window_sec: 2.0
  task_contract:
    observed: A1 through A1.end-0.25s
    target: first same-level immediate successor A2
    pair_rule: 0 <= gap <= min(2s, 0.20*A1.duration), A1.duration >= 1s
    actual_target_horizon_sec: variable 0.25--2.25; audit-only
    predictor_conditioning: fixed 1s on a 2-fps position grid

model:
  backbone: vjepa2
  checkpoint: ../EGO_jihun/checkpoints/vjepa2/vitl.pt
  repository_dir: third_party/vjepa2
  classifier:
    num_probe_blocks: 4
    num_heads: 16
    use_temporal_metadata: true
    temporal_duration_scale_sec: 32.0
  model_kwargs:
    use_v2_1: false
    encoder:
      model_name: vit_large
      checkpoint_key: target_encoder
      tubelet_size: 2
      patch_size: 16
      uniform_power: true
      use_rope: true
    predictor:
      model_name: vit_predictor
      checkpoint_key: predictor
      num_frames: 64
      depth: 12
      num_heads: 12
      predictor_embed_dim: 384
      num_mask_tokens: 10
      uniform_power: true
      use_mask_tokens: true
      use_sdpa: true
      use_silu: false
      wide_silu: false
      use_rope: true
  wrapper_kwargs:
    no_predictor: false
    num_output_frames: 2
    num_steps: 1

extraction:
  batch_size: 8

training:
  train_heads: [verb, noun, action]
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.0001
  final_weight_decay: 0.0001
  start_lr: 0.0
  final_lr: 0.0
  warmup_epochs: 1
  epochs: 10
  sampler: random
  focal_gamma: 2.0
  focal_alpha: 0.25
  precision: bf16
  val_subset_size: 2000
  val_subset_seed: 42
